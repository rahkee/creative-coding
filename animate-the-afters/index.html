<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animate the Afters — Course Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,400;0,6..12,600;1,6..12,400&family=Poppins:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <article class="course-card" id="course-card" aria-labelledby="course-title">
      <div class="course-card__content">
        <header class="course-card__header">
          <h1 class="course-card__title" id="course-title">
            Building Strong Relationships Through Empathy and Understanding
          </h1>
          <p class="course-card__revision-date">Revised April 5th, 2026</p>
        </header>

        <ul class="course-card__tag-list" role="list">
          <li class="course-card__tag course-card__tag--gray">
            <span class="course-card__tag-icon" aria-hidden="true"><i class="fa-solid fa-tree"></i></span>
            <span class="course-card__tag-label">Original</span>
          </li>
          <li class="course-card__tag course-card__tag--lime">
            <span class="course-card__tag-icon" aria-hidden="true"><i class="fa-solid fa-circle-check"></i></span>
            <span class="course-card__tag-label">Published</span>
          </li>
          <li class="course-card__tag course-card__tag--sky">
            <span class="course-card__tag-icon" aria-hidden="true"><i class="fa-solid fa-seedling"></i></span>
            <span class="course-card__tag-label">Native</span>
          </li>
          <li class="course-card__tag course-card__tag--rose">
            <span class="course-card__tag-icon" aria-hidden="true"><i class="fa-solid fa-file-import"></i></span>
            <span class="course-card__tag-label">Imported</span>
          </li>
        </ul>
      </div>

      <div class="course-card__stats">
        <div class="course-card__stat course-card__stat--muted">
          <p class="course-card__stat-value"><span class="course-card__stat-number">6 - 8</span></p>
          <p class="course-card__stat-label">Grade Level</p>
        </div>
        <div class="course-card__stat course-card__stat--muted">
          <p class="course-card__stat-value"><span class="course-card__stat-number" data-count="21" data-suffix="">0</span></p>
          <p class="course-card__stat-label">Objectives</p>
        </div>
        <div class="course-card__stat course-card__stat--accent">
          <p class="course-card__stat-value"><span class="course-card__stat-number" data-count="189" data-suffix="">0</span></p>
          <p class="course-card__stat-label">Standards</p>
        </div>
      </div>
    </article>

    <button type="button" class="replay-btn course-card__replay" id="replay-btn" aria-label="Toggle course card active state">
      <i class="fa-solid fa-arrows-rotate" aria-hidden="true"></i>
    </button>
  </div>

  <script src="script.js"></script>
</body>
</html>
